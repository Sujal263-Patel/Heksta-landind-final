  <script>
    // Automatic version check and cache clearing
    (function () {
      // VERSION_ID is updated on every deployment
      const VERSION_ID = '2.0.3';
      const storedVersion = localStorage.getItem('heksta_version');

      if (!storedVersion || storedVersion !== VERSION_ID) {
        console.log('New version detected:', VERSION_ID);
        localStorage.setItem('heksta_version', VERSION_ID);

        // Only reload if we've already loaded once (to avoid infinite loop)
        if (storedVersion) {
          // Clear caches if the browser supports it
          if ('caches' in window) {
            caches.keys().then(names => {
              for (let name of names) caches.delete(name);
            });
          }
          window.location.reload(true);
        }
      }
    })();
  </script>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('SW registered: ', registration);

            // Force an update check on every load
            registration.update();

            // Handle updates
            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    // New content is available; force a refresh
                    console.log('New content available, refreshing...');
                    window.location.reload();
                  }
                }
              };
            };
          })
          .catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
      });

      // Reload when the service worker takes control
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }

  </script>

</body>
